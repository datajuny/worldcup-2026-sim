<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{

}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace}
.wrap{max-width:720px;margin:0 auto;padding:44px 20px 70px}

/* ───── 헤더 ───── */
.hero{padding:8px 2px 6px}
.eyebrow{font-size:11px;letter-spacing:.22em;color:#FFC83D;font-weight:700}
.eyebrow::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;background:#FFC83D;margin-right:8px;vertical-align:1px}
h1{font-size:34px;line-height:1.22;font-weight:800;margin-top:14px;letter-spacing:-.01em}
h1 .hl{color:#FFC83D}
.hero-sub{margin-top:14px;font-size:15.5px;color:#AFC6E4;font-weight:600}
.hero-sub .mono{font-size:13px;color:#7E8CA3;font-weight:400}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.chip{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:999px;padding:5px 12px;font-size:12.5px;color:#AFC6E4}
.chip b{color:#EAF1FB;font-weight:700}
.chip-red{color:#FF5A5A;border-color:rgba(255,90,90,.35);background:rgba(255,90,90,.07);font-size:11px;padding:2px 8px}

/* ───── 섹션 카드 ───── */
.card{background:#151E2C;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:26px 22px;margin-top:26px}
.sec-head{display:flex;gap:14px;align-items:flex-start}
.sec-num{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#FFC83D;border:1px solid rgba(255,200,61,.4);border-radius:8px;padding:3px 8px;margin-top:3px;flex-shrink:0}
.sec-head h2{font-size:20px;font-weight:800;letter-spacing:-.01em}
.sec-sub{font-size:13.5px;color:#7E8CA3;margin-top:3px}
.sec-body{margin-top:20px}
.sub-block{margin-top:28px}
.sub-block h3{font-size:15px;font-weight:700;color:#AFC6E4;margin-bottom:14px;display:flex;align-items:center}
.sub-block h3::before{content:"";display:inline-block;width:3px;height:13px;background:#FFC83D;margin-right:9px;border-radius:2px}
.foot{font-size:12px;color:#7E8CA3;margin-top:14px;line-height:1.6}

/* ───── 공통 바 ───── */
.bar{height:12px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;min-width:0}
.bar-sm{height:9px}
.bar-fill{height:100%;width:0;border-radius:999px;transition:width .9s cubic-bezier(.22,1,.36,1)}
body.ready .bar-fill{width:var(--w)}
.fill-blue{background:linear-gradient(90deg,#5d86c8,#8AB4F8)}
.fill-yellow{background:linear-gradient(90deg,#e0a922,#FFC83D)}

/* ───── 1. 우승 확률 ───── */
.champ-row{padding:9px 0}
.champ-row + .champ-row{border-top:1px solid rgba(255,255,255,.05)}
.champ-line{display:flex;align-items:baseline;gap:10px;margin-bottom:7px}
.rank{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#7E8CA3;width:24px;flex-shrink:0}
.tname{font-size:15.5px;font-weight:600}
.pct{margin-left:auto;font-size:20px;font-weight:800;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.is-top .pct{color:#FFC83D;font-size:24px}
.is-top .tname{color:#FFC83D}

/* ───── 2. 한국 ───── */
.kr-hero{display:flex;flex-wrap:wrap;gap:18px 28px;align-items:flex-end;background:#1B2638;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px}
.kr-num{font-size:54px;font-weight:800;color:#FFC83D;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.kr-label{font-size:13.5px;color:#AFC6E4;margin-top:8px}
.kr-meta{font-size:13px;color:#7E8CA3;line-height:1.8}
.kr-meta b{color:#EAF1FB;font-weight:700}
.callout{margin-top:16px;padding:13px 16px;border-radius:10px;font-size:14px;color:#D7E2F2;line-height:1.6}
.callout b{font-weight:800}
.callout-yellow{border-left:3px solid #FFC83D;background:rgba(255,200,61,.07)}
.callout-yellow b{color:#FFC83D}
.callout-red{border-left:3px solid #FF5A5A;background:rgba(255,90,90,.07)}
.callout-red b{color:#FF5A5A}
.callout-blue{border-left:3px solid #8AB4F8;background:rgba(138,180,248,.07)}
.callout-blue b{color:#8AB4F8}
.mini-row{display:grid;grid-template-columns:96px 1fr 62px;gap:10px;align-items:center;padding:5px 0}
.mini-label{font-size:13px;color:#AFC6E4}
.mini-pct{font-size:13.5px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.mini-row.is-hot .mini-label,.mini-row.is-hot .mini-pct{color:#FFC83D;font-weight:800}
.match{margin-bottom:18px}
.match:last-child{margin-bottom:0}
.match-name{font-size:14.5px;font-weight:700;margin-bottom:8px}
.splitbar{display:flex;height:16px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.06)}
.seg{width:0;height:100%;transition:width .9s cubic-bezier(.22,1,.36,1)}
body.ready .seg{width:var(--w)}
.seg-win{background:#4ADE80}
.seg-draw{background:#566378}
.seg-loss{background:#FF5A5A}
.match-legend{display:flex;gap:16px;margin-top:8px;font-size:12.5px;color:#AFC6E4;flex-wrap:wrap;font-variant-numeric:tabular-nums}
.dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:-.5px}
.dot-win{background:#4ADE80}.dot-draw{background:#566378}.dot-loss{background:#FF5A5A}

/* ───── 3. 전력 점수 ───── */
.formula{font-size:12.5px;color:#AFC6E4;background:#0F1420;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:13px 15px;line-height:1.7;overflow-wrap:break-word}
.legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:14px;font-size:12.5px;color:#AFC6E4}
.dot-rank{background:#8AB4F8}.dot-form{background:#4ADE80}.dot-val{background:#FFC83D}
.dot-corr{background:rgba(255,255,255,.34)}
.dot-pen{background:repeating-linear-gradient(135deg,#FF5A5A 0,#FF5A5A 3px,#7d2e2e 3px,#7d2e2e 6px)}
.dot-ronly{background:#46536b}
.str-row{padding:9px 0}
.str-row + .str-row{border-top:1px solid rgba(255,255,255,.05)}
.str-line{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.str-line .tname{font-size:14.5px}
.score{margin-left:auto;font-family:ui-monospace,Menlo,monospace;font-size:14px;font-weight:700;color:#AFC6E4;font-variant-numeric:tabular-nums}
.badge{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid;line-height:1.5}
.badge-green{color:#4ADE80;border-color:rgba(74,222,128,.4)}
.badge-yellow{color:#FFC83D;border-color:rgba(255,200,61,.4)}
.badge-muted{color:#7E8CA3;border-color:rgba(126,140,163,.4)}
.strbar{display:flex;height:14px;width:0;border-radius:4px;overflow:hidden;transition:width .9s cubic-bezier(.22,1,.36,1)}

.sseg{width:var(--w);height:100%;flex-shrink:0}
.s-rank{background:#8AB4F8}.s-form{background:#4ADE80}.s-val{background:#FFC83D}
.s-corr{background:rgba(255,255,255,.30)}
.s-pen{background:repeating-linear-gradient(135deg,#FF5A5A 0,#FF5A5A 4px,#7d2e2e 4px,#7d2e2e 8px)}
.s-ronly{background:#46536b}

/* ───── 4. 다크호스 ───── */
.dh-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.dh-card{background:#1B2638;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px}
.dh-name{font-size:17px;font-weight:800}
.dh-meta{font-size:12px;color:#7E8CA3;margin:4px 0 12px}
.dh-card .mini-row{grid-template-columns:42px 1fr 58px;gap:8px;padding:4px 0}
.dh-card .mini-label{font-size:12px}
.dh-card .mini-pct{font-size:12.5px}

/* ───── 5. 한계 ───── */
ol.limits{list-style:none;counter-reset:lim;margin-top:18px}
ol.limits li{display:flex;gap:12px;padding:11px 0;font-size:13.5px;color:#B9C6DA;line-height:1.65;border-bottom:1px dashed rgba(255,255,255,.08)}
ol.limits li:last-child{border-bottom:none}
ol.limits li::before{counter-increment:lim;content:counter(lim,decimal-leading-zero);font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#FFC83D;flex-shrink:0;margin-top:2px}

.pfoot{margin-top:40px;font-size:12px;color:#7E8CA3;line-height:1.8;text-align:center}

@media (max-width:480px){
  .wrap{padding:32px 16px 56px}
  h1{font-size:27px}
  .kr-num{font-size:44px}
  .card{padding:20px 16px}
  .mini-row{grid-template-columns:88px 1fr 58px}
  .dh-grid{grid-template-columns:1fr}
  .pct{font-size:18px}
  .is-top .pct{font-size:21px}

@media (max-width:560px) and (min-width:481px){
  .dh-grid{grid-template-columns:1fr}
}
@media (prefers-reduced-motion:reduce){
  .bar-fill,.seg,.strbar{transition:none}

</style>

const DATA = {"meta":{"seed":42,"iterations":10000,"avgGoalsPerMatch":2.69,"generatedOn":"2026-06-07","matchesPerIteration":104,"baseGoals":1.22,"alpha":1.15},"model":{"strengthFormula":"S = 0.55·norm(fifaPoints) + 0.20·(최근 10경기 승점률) + 0.25·norm(log(시장가치 MEUR)) − 부상 페널티 + 커버리지 보정상수(상세 데이터 8개국에만 적용)","weights":{"rank":{"value":0.55,"rationale":"FIFA 포인트는 수년치 공식 경기 결과를 누적 반영하는 가장 안정적인 단일 지표라 베이스로 최대 가중"},"form":{"value":0.2,"rationale":"최근 10경기는 현재 컨디션을 반영하지만 표본이 작고 친선전이 섞여 노이즈가 커서 보조 가중"},"value":{"value":0.25,"rationale":"스쿼드 시장가치(로그 스케일)는 랭킹이 못 잡는 선수단 체급 차이의 대리 지표 — 랭킹 포인트가 거의 같은 1~3위(프랑스·스페인·아르헨티나)를 변별하는 핵심 항목"},"injuryPenalty":{"value":0.02,"rationale":"확인된 주전 부상 보도가 있는 잉글랜드(Livramento·Colwill 제외, James·Spence 복귀 직후, Stones 피트니스 우려)에만 0.02 감점 — 타 팀은 부상 데이터 미확보라 0"},"coverageBiasCorrection":{"value":0.1176,"rationale":"상세 데이터 8개국의 평균 점수를 같은 8개국의 랭킹 단독 점수 평균과 일치시키는 상수 — 데이터가 있다는 이유로 코호트 전체가 랭킹 단독 40개국 대비 불리해지는 비대칭 제거 (코호트 내부 서열은 폼·시장가치·부상으로 결정)"}},"matchModel":"lambda_A = 1.22 × exp(1.15 × (S_A − S_B)) 양 팀 독립 Poisson(Knuth 샘플링), 동률 시 연장(λ×1/3 Poisson) → 승부차기(전력차 반영 0.5±0.15)","limitations":["폼·시장가치·부상은 FIFA 상위 8개국만 조사됨 — 나머지 40개국은 FIFA 랭킹 100%(dataCoverage: ranking-only). 9~16위권(독일·벨기에·크로아티아 등)의 폼·시장가치는 미반영이라 이들 점수는 상대적으로 보수적","스페인·잉글랜드 시장가치는 EUR 확정치 미확보(USD 2차 보도만) — 상세 코호트 평균 norm 값(0.5212)으로 대체(imputed)","부상 데이터는 잉글랜드만 확보 — 타 팀 페널티 0은 '부상 없음'이 아니라 '데이터 없음'","팀 컨덕트 스코어(옐로·레드카드)는 데이터가 없어 조 순위·3위 비교 모두에서 모델링 불가 — 승점→골득실→다득점→FIFA 포인트→난수 추첨 순으로 대체. 조 내 동률 시 헤드투헤드 규정도 미적용","3위 8팀의 32강 슬롯 배정은 FIFA 규정 Annex C의 495가지 조합표 대신 '슬롯별 허용 조 풀 안 이분 매칭' 근사 — 매칭 실패 폴백 발생 0/10000회","16강 이후 대진은 조사 데이터에 없어 32강 매치(73~88) 승자를 번호 순서대로 페어링(W73 vs W74, …)하는 근사 — 실제 FIFA 브래킷과 다를 수 있음","미반영 변수: 감독 전술, 선수 컨디션·피로, 날씨·기온, 이동 거리, 홈 어드밴티지(개최 3국 미국·캐나다·멕시코 보정 없음), 승부차기 전문 능력","프랑스 최근 10경기 중 코트디부아르전은 소스 상충(ESPN 1-2 패 vs 타 소스 0-0 무) — ESPN 표기(패) 채택","avgGoalsPerMatch는 정규 90분 득점 기준(연장 득점 제외), 3·4위전 포함 104경기 전체 평균","결과는 단정 예측이 아니라 시드 고정 몬테카를로의 확률 분포 — 모델 가정이 바뀌면 수치도 바뀜"]},"teams":[{"name":"멕시코","name     const gross = t => {
      const c = t.components;
      if (t.dataCoverage === "ranking-only") return t.strengthScore;
      return W.rank.value * c.ranking + W.form.value * c.form + W.value.value * c.marketValue + corr;
    };
    const maxGross = Math.max(...top.map(gross));
    const sec = section("03", "전력 점수, 무엇으로 만들었나", `폼·시장가치·부상은 FIFA 상위 ${detailCount}개국만 조사, 나머지는 랭킹 단독`);
    const body = sec.querySelector(".sec-body");

    body.appendChild(h(`<div class="formula mono">${esc(DATA.model.strengthFormula)}</div>`));
    body.appendChild(h(`<div class="legend">
      <span><i class="dot dot-rank"></i>FIFA 랭킹 ×${W.rank.value}</span>
      <span><i class="dot dot-form"></i>최근 폼 ×${W.form.value}</span>
      <span><i class="dot dot-val"></i>시장가치 ×${W.value.value}</span>
      <span><i class="dot dot-corr"></i>커버리지 보정 +${corr}</span>
      <span><i class="dot dot-pen"></i>부상 감점</span>
      <span><i class="dot dot-ronly"></i>랭킹 단독</span>
    </div>`));

    const COV = {
      "full": ["상세 데이터", "badge-green"],
      "detail-value-imputed": ["시장가치 추정치", "badge-yellow"],
      "ranking-only": ["랭킹 단독", "badge-muted"]
    };
    top.forEach(t => {
      const c = t.components;
      const g = gross(t);
      let segs = "";
      if (t.dataCoverage === "ranking-only") {
        segs = `<div class="sseg s-ronly" style="--w:100%"></div>`;
      } else {
        const pen = c.injuryPenalty || 0;
        const parts = [
          ["s-rank", W.rank.value * c.ranking],
          ["s-form", W.form.value * c.form],
          ["s-val", W.value.value * c.marketValue],
          ["s-corr", corr - pen]
        ];
        if (pen > 0) parts.push(["s-pen", pen]);
        segs = parts.map(([cls, v]) => `<div class="sseg ${cls}" style="--w:${(v / g * 100).toFixed(2)}%"></div>`).join("");
      }
      const cov = COV[t.dataCoverage] || [t.dataCoverage, "badge-muted"];
      const penChip = c.injuryPenalty > 0 ? `<span class="chip chip-red">부상 −${c.injuryPenalty}</span>` : "";
      body.appendChild(h(`<div class="str-row">
        <div class="str-line">
          <span class="tname">${esc(t.name)}</span>
          <span class="badge ${cov[1]}">${esc(cov[0])}</span>
          ${penChip}
          <span class="score">${t.strengthScore}</span>
        </div>
        <div class="strbar" style="--tw:${(g / maxGross * 100).toFixed(1)}%">${segs}</div>
      </div>`));
    });
    body.appendChild(h(`<p class="foot">전력 점수 상위 ${top.length}팀. 랭킹 단독 팀은 폼·시장가치·부상 데이터가 조사되지 않아 FIFA 랭킹이 점수의 전부입니다. 빨간 빗금은 부상 감점으로 깎인 양이고, 커버리지 보정은 상세 조사 ${detailCount}개국이 데이터 보유만으로 불리해지지 않게 더한 상수입니다.</p>`));
    return sec;
  }

  /* ── 4. 다크호스 ── */
  function renderDarkHorses(){
    const d = DATA.darkHorses;
    const sec = section("04", "다크호스", "랭킹 시드 대비 토너먼트 진출 확률이 높은 팀");
    const body = sec.querySelector(".sec-body");
    body.appendChild(h(`<div class="callout callout-blue"><b>선정 기준</b> · ${esc(d.criterion)}</div>`));
    const grid = h(`<div class="dh-grid"></div>`);
    d.teams.forEach(t => {
      const rows = [["32강", t.r32], ["16강", t.r16], ["8강", t.qf]]
        .map(([lab, p]) => `<div class="mini-row">
          <span class="mini-label">${lab}</span>
          <div class="bar bar-sm"><div class="bar-fill fill-blue" style="--w:${(p * 100).toFixed(1)}%"></div></div>
          <span class="mini-pct">${fmtPct(p)}</span>
        </div>`).join("");
      grid.appendChild(h(`<div class="dh-card">
        <div class="dh-name">${esc(t.team)}</div>
        <div class="dh-meta">${esc(t.group)}조 · FIFA ${t.fifaRank}위 · 전력 ${t.strengthScore}</div>
        ${rows}
      </div>`));
    });
    body.appendChild(grid);
    body.appendChild(h(`<p class="foot">각 라운드 진출 확률. 이 바 길이는 절대 확률입니다 (바 전체 = 100%).</p>`));
    return sec;
  }

  /* ── 5. 모델 한계 ── */
  function renderLimitations(){
    const sec = section("05", "한계점", "한계를 모르면 숫자를 오독하게 됩니다");
    const body = sec.querySelector(".sec-body");
    body.appendChild(h(`<div class="callout callout-red">
      이 페이지의 모든 수치는 누가 우승한다는 단정이 아니라, 시드를 고정한 <b>${fmtInt(DATA.meta.iterations)}회 시뮬레이션에서 각 사건이 나온 빈도, 즉 확률 분포</b>입니다. 모델 가정이 바뀌면 숫자도 바뀝니다.
    </div>`));
    const ol = h(`<ol class="limits"></ol>`);
    DATA.model.limitations.forEach(li => ol.appendChild(h(`<li>${esc(li)}</li>`)));
    body.appendChild(ol);
    return sec;
  }

  function renderFooter(){
    const m = DATA.meta;
    return h(`<footer class="pfoot">MIDNIGHT LOG · 데이터 기준일 ${esc(m.generatedOn)} · seed ${m.seed} 고정이라 같은 입력이면 같은 결과가 재현됩니다.<br>본 페이지는 통계 모델 실험이며, 베팅 등 실제 의사결정의 근거로 사용할 수 없습니다.</footer>`);
  }

  [renderHeader(), renderChampions(), renderKorea(), renderStrength(), renderDarkHorses(), renderLimitations(), renderFooter()]
    .forEach(node => $app.appendChild(node));

  requestAnimationFrame(() => requestAnimationFrame(() => document.body.classList.add("ready")));
})();
</script>
</body>
</html>
